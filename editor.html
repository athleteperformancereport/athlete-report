<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Athlete Report Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f3f4f6;padding-bottom:80px;}
h1{background:#111827;color:#fff;padding:16px;font-size:18px;}
h1 span{display:block;font-size:12px;color:#9ca3af;font-weight:400;margin-top:2px;}
.card{background:#fff;margin:12px;border-radius:10px;padding:16px;border:1px solid #e5e7eb;}
.card h2{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px;margin-top:10px;}
input[type=text],input[type=date],input[type=password],textarea{
  display:block;width:100%;padding:12px;font-size:16px;
  border:1.5px solid #d1d5db;border-radius:8px;
  background:#fff;color:#000;font-family:-apple-system,sans-serif;
  -webkit-appearance:none;outline:none;
}
textarea{min-height:120px;resize:vertical;}
input:focus,textarea:focus{border-color:#6366f1;}
table{width:100%;border-collapse:collapse;margin-top:8px;}
th{background:#f9fafb;padding:8px 4px;font-size:11px;border:1px solid #e5e7eb;text-align:center;}
th:first-child{text-align:left;}
td{padding:4px;border:1px solid #e5e7eb;}
td input{
  width:100%;padding:10px 4px;font-size:16px;text-align:center;
  border:1px solid #e5e7eb;border-radius:6px;
  background:#fff;color:#000;
  -webkit-appearance:none;outline:none;font-family:-apple-system,sans-serif;
}
td:first-child input{text-align:left;font-size:14px;}
.pis{color:#ef4444;}.pss{color:#3b82f6;}.ras{color:#10b981;}.cpts{color:#f59e0b;}
.btns{display:flex;gap:8px;margin-top:12px;}
.badd{flex:1;padding:14px;background:#111827;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;}
.brem{flex:1;padding:14px;background:#e5e7eb;color:#374151;border:none;border-radius:10px;font-size:15px;font-weight:700;}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;padding:10px 12px;display:flex;gap:8px;}
.bexp{flex:1;padding:15px;background:#6366f1;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;}
.bexp:disabled{background:#a5b4fc;}
.bpdf{flex:1;padding:15px;background:#111827;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;opacity:0;transition:opacity 0.3s;z-index:999;pointer-events:none;white-space:nowrap;color:#fff;}
.toast.show{opacity:1;}
.toast.ok{background:#16a34a;}
.toast.err{background:#dc2626;}
.toast.info{background:#111827;}
.token-status{font-size:12px;margin-top:8px;padding:8px 10px;border-radius:6px;}
.token-ok{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
.token-missing{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa;}
.btn-save-token{margin-top:8px;padding:10px 16px;background:#111827;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-clear-token{margin-top:8px;padding:10px 16px;background:#fee2e2;color:#dc2626;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:none;}

/* Print styles */
@media print {
  body{background:#fff;padding:0;}
  .no-print{display:none!important;}
  .print-area{display:block!important;}
  .footer{display:none!important;}
  h1{display:none!important;}
  .card{display:none!important;}
  #printArea{display:block!important;}
}
#printArea{display:none;}
</style>
</head>
<body>

<h1>⚙️ Athlete Report Editor<span>Edit below — tap Publish to update the client report instantly</span></h1>

<!-- GitHub Settings -->
<div class="card no-print">
  <h2>⚙️ GitHub Settings (One time setup)</h2>
  <label>GitHub Personal Access Token</label>
  <input type="password" id="f_token" placeholder="Paste your GitHub token here"/>
  <div id="tokenStatus" class="token-status token-missing">⚠️ No token saved yet</div>
  <button class="btn-save-token" id="btnSaveToken">💾 Save Token</button>
  <button class="btn-clear-token" id="btnClearToken">🗑 Clear Token</button>
  <label>Repository Name</label>
  <input type="text" id="f_repo" placeholder="e.g. athlete-report" autocorrect="off" spellcheck="false"/>
</div>

<!-- Athlete Details -->
<div class="card no-print">
  <h2>Athlete Details</h2>
  <label>Athlete Name</label>
  <input type="text" id="f_name" placeholder="e.g. John Doe" autocorrect="off" spellcheck="false"/>
  <label>Team</label>
  <input type="text" id="f_team" placeholder="e.g. Team Alpha" autocorrect="off" spellcheck="false"/>
  <label>Coach Name</label>
  <input type="text" id="f_coach" placeholder="e.g. Coach Smith" autocorrect="off" spellcheck="false"/>
  <label>Report Date</label>
  <input type="date" id="f_date"/>
</div>

<!-- Score Data -->
<div class="card no-print">
  <h2>Score Data (0–100, lower is better)</h2>
  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th style="min-width:90px;text-align:left;">Period</th>
          <th class="pis">PIS</th>
          <th class="pss">PSS</th>
          <th class="ras">RAS</th>
          <th class="cpts">CPTS</th>
        </tr>
      </thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
  <div class="btns">
    <button class="badd" id="btnAdd">+ Add Period</button>
    <button class="brem" id="btnRem">− Remove</button>
  </div>
</div>

<!-- Conclusions -->
<div class="card no-print">
  <h2>Conclusions</h2>
  <textarea id="f_conc" placeholder="Write your conclusions here..."></textarea>
</div>

<!-- Print Area (hidden until print) -->
<div id="printArea"></div>

<div class="footer">
  <button class="bexp" id="btnExp">🚀 Publish</button>
  <button class="bpdf" id="btnPdf">🖨 Save PDF</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
var GITHUB_USER = 'athleteperformancereport';

var rows = [
  {month:'Month 1',PIS:72,PSS:65,RAS:58,CPTS:60},
  {month:'Month 2',PIS:68,PSS:68,RAS:63,CPTS:62},
  {month:'Month 3',PIS:63,PSS:74,RAS:70,CPTS:67},
  {month:'Month 4',PIS:58,PSS:78,RAS:75,CPTS:73},
  {month:'Month 5',PIS:52,PSS:82,RAS:80,CPTS:79},
  {month:'Month 6',PIS:47,PSS:87,RAS:85,CPTS:84}
];

var C  = {PIS:'#ef4444',PSS:'#3b82f6',RAS:'#10b981',CPTS:'#f59e0b'};
var ML = {PIS:'Performance Interference Score',PSS:'Pressure Stability Score',RAS:'Role Alignment Score',CPTS:'Coach Performance Trust Score'};
var MD = {
  PIS:'Measures subconscious interference such as hesitation, overthinking, confidence fluctuation and mental noise. Lower is better.',
  PSS:'Measures how athletes handle pressure, mistakes, and turnovers. Lower is better.',
  RAS:'Measures an athlete\'s resistance with role assessment. Lower is better.',
  CPTS:'Measures how much trust the Coach has in an athlete under pressure. Lower is better.'
};
var WORST = {PIS:80, PSS:60, RAS:60, CPTS:60};
var M = ['PIS','PSS','RAS','CPTS'];

function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'info');
  setTimeout(function(){t.className='toast';},3500);
}

// Token management
function loadToken(){
  var token=localStorage.getItem('gh_token');
  var repo=localStorage.getItem('gh_repo');
  if(token){
    document.getElementById('f_token').value='••••••••••••••••••••';
    document.getElementById('tokenStatus').className='token-status token-ok';
    document.getElementById('tokenStatus').textContent='✅ Token saved securely in your browser';
    document.getElementById('btnClearToken').style.display='inline-block';
    document.getElementById('btnSaveToken').textContent='💾 Update Token';
  }
  if(repo) document.getElementById('f_repo').value=repo;
}

document.getElementById('btnSaveToken').addEventListener('click',function(){
  var val=document.getElementById('f_token').value.trim();
  var repo=document.getElementById('f_repo').value.trim();
  if(!val||val.indexOf('•')!==-1){showToast('⚠️ Please paste your token first','err');return;}
  if(!repo){showToast('⚠️ Please enter your repo name','err');return;}
  localStorage.setItem('gh_token',val);
  localStorage.setItem('gh_repo',repo);
  document.getElementById('f_token').value='••••••••••••••••••••';
  document.getElementById('tokenStatus').className='token-status token-ok';
  document.getElementById('tokenStatus').textContent='✅ Token saved securely in your browser';
  document.getElementById('btnClearToken').style.display='inline-block';
  document.getElementById('btnSaveToken').textContent='💾 Update Token';
  showToast('✅ Token saved!','ok');
});

document.getElementById('btnClearToken').addEventListener('click',function(){
  localStorage.removeItem('gh_token');
  localStorage.removeItem('gh_repo');
  document.getElementById('f_token').value='';
  document.getElementById('f_repo').value='';
  document.getElementById('tokenStatus').className='token-status token-missing';
  document.getElementById('tokenStatus').textContent='⚠️ No token saved yet';
  document.getElementById('btnClearToken').style.display='none';
  document.getElementById('btnSaveToken').textContent='💾 Save Token';
  showToast('Token cleared','info');
});

function save(){
  try{
    localStorage.setItem('rpt',JSON.stringify({
      name:document.getElementById('f_name').value,
      team:document.getElementById('f_team').value,
      coach:document.getElementById('f_coach').value,
      date:document.getElementById('f_date').value,
      conc:document.getElementById('f_conc').value,
      rows:rows
    }));
  }catch(e){}
}

function load(){
  try{
    var s=localStorage.getItem('rpt');
    if(s){
      var d=JSON.parse(s);
      document.getElementById('f_name').value=d.name||'';
      document.getElementById('f_team').value=d.team||'';
      document.getElementById('f_coach').value=d.coach||'';
      document.getElementById('f_date').value=d.date||'';
      document.getElementById('f_conc').value=d.conc||'';
      if(d.rows&&d.rows.length)rows=d.rows;
    }
  }catch(e){}
  renderTable();
  loadToken();
}

function renderTable(){
  var tb=document.getElementById('tbl');
  tb.innerHTML='';
  for(var i=0;i<rows.length;i++){
    (function(idx){
      var tr=document.createElement('tr');
      var keys=['month','PIS','PSS','RAS','CPTS'];
      for(var j=0;j<keys.length;j++){
        (function(key){
          var td=document.createElement('td');
          var inp=document.createElement('input');
          if(key==='month'){
            inp.type='text';
            inp.setAttribute('inputmode','text');
            inp.setAttribute('autocorrect','off');
            inp.setAttribute('spellcheck','false');
            inp.style.textAlign='left';
          } else {
            inp.type='number';
            inp.setAttribute('inputmode','numeric');
            inp.min='0';inp.max='100';
          }
          inp.value=rows[idx][key];
          inp.addEventListener('change',function(){
            if(key==='month'){rows[idx][key]=this.value;}
            else{
              var v=parseInt(this.value,10);
              if(isNaN(v))v=0;if(v<0)v=0;if(v>100)v=100;
              rows[idx][key]=v;this.value=v;
            }
            save();
          });
          td.appendChild(inp);tr.appendChild(td);
        })(keys[j]);
      }
      tb.appendChild(tr);
    })(i);
  }
}

document.getElementById('btnAdd').addEventListener('click',function(){
  rows.push({month:'Month '+(rows.length+1),PIS:50,PSS:50,RAS:50,CPTS:50});
  renderTable();save();showToast('Period added!','ok');
});
document.getElementById('btnRem').addEventListener('click',function(){
  if(rows.length>1){rows.pop();renderTable();save();showToast('Period removed!','info');}
});
['f_name','f_team','f_coach','f_date','f_conc'].forEach(function(id){
  document.getElementById(id).addEventListener('input',save);
});

// PDF Print
document.getElementById('btnPdf').addEventListener('click',function(){
  var name=document.getElementById('f_name').value||'Athlete Name';
  var team=document.getElementById('f_team').value||'Team';
  var coach=document.getElementById('f_coach').value||'Coach Name';
  var conc=document.getElementById('f_conc').value||'';
  var dval=document.getElementById('f_date').value;
  var dateStr=dval?new Date(dval+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

  // Build cards HTML for print
  var cardsHtml=M.map(function(k){
    var vals=rows.map(function(r){return r[k];});
    var last=vals[vals.length-1];
    var diff=last-vals[0];
    return '<div style="background:#fff;border:2px solid '+C[k]+';border-radius:10px;padding:12px;text-align:center;">'
      +'<div style="font-size:12px;font-weight:700;color:'+C[k]+';margin-bottom:4px;">'+ML[k]+' ('+k+')</div>'
      +'<div style="font-size:28px;font-weight:800;color:#111827;">'+last+'</div>'
      +'<div style="font-size:12px;font-weight:600;color:'+(diff<0?'#16a34a':'#dc2626')+';">'+(diff>=0?'▲':'▼')+' '+Math.abs(diff)+' pts</div>'
      +'</div>';
  }).join('');

  // Build desc HTML for print
  var descHtml=M.map(function(k){
    return '<div style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:12px;display:flex;gap:10px;">'
      +'<div style="width:3px;border-radius:4px;background:'+C[k]+';flex-shrink:0;"></div>'
      +'<div><div style="font-size:11px;font-weight:700;color:'+C[k]+';text-transform:uppercase;">'+ML[k]+' ('+k+')</div>'
      +'<div style="font-size:12px;color:#6b7280;margin-top:4px;">'+MD[k]+'</div></div></div>';
  }).join('');

  // Build table rows for print
  var trows=rows.map(function(r){
    return '<tr><td style="padding:8px;border:1px solid #e5e7eb;font-weight:600;">'+r.month+'</td>'
      +M.map(function(k){return '<td style="padding:8px;border:1px solid #e5e7eb;text-align:center;font-weight:600;color:'+C[k]+';">'+r[k]+'</td>';}).join('')
      +'</tr>';
  }).join('');

  // Score range
  var rangeHtml=M.map(function(k){
    return '<span style="margin-right:16px;"><span style="color:'+C[k]+';font-weight:700;">'+k+'</span> — best: 0 &nbsp;|&nbsp; worst: '+WORST[k]+'</span>';
  }).join('');

  var printContent='<!DOCTYPE html><html><head>'
    +'<meta charset="UTF-8"/>'
    +'<title>Athlete Performance Report — '+name+'</title>'
    +'<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>'
    +'<style>'
    +'*{box-sizing:border-box;margin:0;padding:0;}'
    +'body{font-family:-apple-system,sans-serif;background:#fff;padding:24px;color:#111827;}'
    +'.hdr{background:#111827;color:#fff;padding:20px;border-radius:10px;margin-bottom:20px;}'
    +'.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}'
    +'.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:16px;}'
    +'.sec{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;margin-top:16px;}'
    +'table{width:100%;border-collapse:collapse;font-size:13px;}'
    +'th{background:#f9fafb;padding:8px;border:1px solid #e5e7eb;font-size:11px;font-weight:700;}'
    +'@media print{'
    +'body{padding:16px;}'
    +'.nobreak{page-break-inside:avoid;}'
    +'canvas{max-width:100%!important;}'
    +'}'
    +'</style></head><body>'
    +'<div class="hdr">'
    +'<div style="font-size:10px;letter-spacing:2px;color:#9ca3af;text-transform:uppercase;margin-bottom:6px;">Athlete Performance Report</div>'
    +'<div style="font-size:22px;font-weight:700;">'+name+'</div>'
    +'<div style="font-size:13px;color:#d1d5db;margin-top:4px;">'+team+' &nbsp;·&nbsp; '+coach+'</div>'
    +'<div style="font-size:11px;color:#6b7280;margin-top:4px;">'+dateStr+'</div>'
    +'</div>'
    +'<div class="sec">Score Summary</div>'
    +'<div class="grid4 nobreak">'+cardsHtml+'</div>'
    +'<div class="sec">Score Descriptions</div>'
    +'<div class="grid2 nobreak">'+descHtml+'</div>'
    +'<div class="sec">Score Trends Over Time</div>'
    +'<div class="nobreak" style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:8px;">'
    +'<canvas id="printChart" style="width:100%;height:280px;"></canvas>'
    +'<div style="font-size:11px;color:#6b7280;margin-top:10px;">'+rangeHtml+'</div>'
    +'</div>'
    +'<div class="sec">Score Data</div>'
    +'<div class="nobreak" style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:16px;">'
    +'<table><thead><tr><th style="text-align:left;">Period</th>'
    +M.map(function(k){return '<th style="color:'+C[k]+';">'+ML[k]+' ('+k+')</th>';}).join('')
    +'</tr></thead><tbody>'+trows+'</tbody></table></div>'
    +(conc?'<div class="sec">Conclusions</div>'
    +'<div class="nobreak" style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;">'
    +'<div style="font-size:14px;color:#374151;line-height:1.85;white-space:pre-line;">'+conc+'</div></div>':'')
    +'<script>'
    +'window.onload=function(){'
    +'var D='+JSON.stringify(rows)+';'
    +'var C={PIS:"#ef4444",PSS:"#3b82f6",RAS:"#10b981",CPTS:"#f59e0b"};'
    +'var M=["PIS","PSS","RAS","CPTS"];'
    +'var ctx=document.getElementById("printChart").getContext("2d");'
    +'new Chart(ctx,{type:"line",'
    +'data:{labels:D.map(function(d){return d.month;}),'
    +'datasets:M.map(function(k){return{label:k,data:D.map(function(d){return d[k];}),borderColor:C[k],backgroundColor:C[k]+"22",borderWidth:2.5,pointRadius:5,tension:0.35,fill:false};})},'
    +'options:{responsive:false,animation:{duration:0},'
    +'plugins:{legend:{position:"bottom"}},'
    +'scales:{y:{min:0,max:100},x:{}}}});'
    +'setTimeout(function(){window.print();},800);'
    +'};'
    +'<\/script></body></html>';

  var w=window.open('','_blank');
  w.document.open();
  w.document.write(printContent);
  w.document.close();
});

function buildHTML(){
  var name=document.getElementById('f_name').value||'Athlete Name';
  var team=document.getElementById('f_team').value||'Team';
  var coach=document.getElementById('f_coach').value||'Coach Name';
  var conc=document.getElementById('f_conc').value||'';
  var dval=document.getElementById('f_date').value;
  var dateStr=dval?new Date(dval+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

  var cards=M.map(function(k){
    var vals=rows.map(function(r){return r[k];});
    var last=vals[vals.length-1];
    var diff=last-vals[0];
    return '<div class="mc" id="c-'+k+'" onclick="tog(\''+k+'\')" style="border-color:'+C[k]+'">'
      +'<div style="font-size:12px;font-weight:700;color:'+C[k]+';margin-bottom:6px;">'+ML[k]+' ('+k+')</div>'
      +'<div style="font-size:26px;font-weight:700;color:#111827;">'+last+'</div>'
      +'<div style="font-size:12px;font-weight:600;color:'+(diff<0?'#16a34a':'#dc2626')+';">'+(diff>=0?'▲':'▼')+' '+Math.abs(diff)+' pts</div>'
      +'</div>';
  }).join('');

  var descs=M.map(function(k){
    return '<div style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:14px;display:flex;gap:10px;">'
      +'<div style="width:3px;border-radius:4px;background:'+C[k]+';flex-shrink:0;"></div>'
      +'<div><div style="font-size:11px;font-weight:700;color:'+C[k]+';text-transform:uppercase;">'+ML[k]+' ('+k+')</div>'
      +'<div style="font-size:12px;color:#6b7280;margin-top:4px;">'+MD[k]+'</div></div></div>';
  }).join('');

  var trows=rows.map(function(r){
    return '<tr><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600;">'+r.month+'</td>'
      +M.map(function(k){return '<td style="padding:10px;border:1px solid #e5e7eb;text-align:center;font-weight:600;color:'+C[k]+';">'+r[k]+'</td>';}).join('')
      +'</tr>';
  }).join('');

  var rangeHtml=M.map(function(k){
    return '<span style="display:inline-block;margin:4px 12px 4px 0;font-size:12px;">'
      +'<span style="color:'+C[k]+';font-weight:700;">'+k+'</span>'
      +' — best: <strong>0</strong> &nbsp;|&nbsp; worst: <strong>'+WORST[k]+'</strong></span>';
  }).join('');

  var safeConc=conc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  return '<!DOCTYPE html><html lang="en"><head>'
    +'<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>'
    +'<title>Athlete Performance Report</title>'
    +'<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>'
    +'<style>'
    +'*{box-sizing:border-box;margin:0;padding:0;}'
    +'body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f9fafb;}'
    +'.hdr{background:#111827;color:#fff;padding:24px 16px;}'
    +'.lbl{font-size:10px;letter-spacing:2px;color:#9ca3af;text-transform:uppercase;margin-bottom:8px;}'
    +'.hdr h1{font-size:22px;font-weight:700;}'

async function publishToGitHub(){
  var token=localStorage.getItem('gh_token');
  var repo=localStorage.getItem('gh_repo');
  if(!token){showToast('⚠️ Please save your token first!','err');return;}
  if(!repo){showToast('⚠️ Please enter your repo name!','err');return;}
  var btn=document.getElementById('btnExp');
  btn.disabled=true;btn.textContent='Publishing...';
  showToast('⏳ Publishing to GitHub...','info');
  var html=buildHTML();
  var content=btoa(unescape(encodeURIComponent(html)));
  var apiURL='https://api.github.com/repos/'+GITHUB_USER+'/'+repo+'/contents/index.html';
  try{
    var sha=null;
    try{
      var getRes=await fetch(apiURL,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}});
      if(getRes.ok){var getData=await getRes.json();sha=getData.sha;}
    }catch(e){}
    var body={message:'Update athlete report - '+new Date().toLocaleString(),content:content,branch:'main'};
    if(sha)body.sha=sha;
    var putRes=await fetch(apiURL,{method:'PUT',headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(putRes.ok){showToast('✅ Published! Live in 1–2 mins.','ok');}
    else{var err=await putRes.json();showToast('❌ '+(err.message||'Error. Try again.'),'err');}
  }catch(e){showToast('❌ Network error. Check connection.','err');}
  btn.disabled=false;btn.textContent='🚀 Publish';
}

document.getElementById('btnExp').addEventListener('click',publishToGitHub);
load();
</script>
